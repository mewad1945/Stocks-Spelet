<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Street Tycoon</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --accent-blue: #3b82f6;
            --gold: #fbbf24;
            --border: #1f2937;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            padding: 20px;
        }

        header {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            position: sticky;
            top: 15px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo h1 { margin: 0; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--accent-blue); }

        .wallet-info { text-align: right; }
        .wallet-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
        .balance-val { font-size: 2rem; font-weight: 800; color: var(--accent-green); font-variant-numeric: tabular-nums; }

        .market-grid { display: grid; gap: 12px; }

        .stock-card {
            background: var(--card-bg);
            border-radius: 12px;
            display: grid;
            grid-template-columns: 200px 1fr 140px 160px;
            align-items: center;
            padding: 15px 20px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .stock-card:hover { border-color: #374151; transform: scale(1.01); }

        .stock-name h3 { margin: 0; font-size: 1.1rem; }
        .ticker { font-size: 0.75rem; color: #6b7280; font-weight: bold; }

        .chart-container { height: 60px; margin: 0 15px; }
        canvas { width: 100%; height: 100%; }

        .price-info { text-align: right; padding-right: 20px; }
        .price-now { font-family: 'monospace'; font-size: 1.2rem; font-weight: bold; }
        .owned-tag { font-size: 0.8rem; color: #94a3b8; }

        .btn-group { display: flex; gap: 8px; }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .buy-btn { background: var(--accent-green); color: #064e3b; }
        .buy-btn:hover { background: #34d399; }
        .sell-btn { background: #1f2937; color: white; }
        .sell-btn:hover { background: var(--accent-red); }
        button:disabled { opacity: 0.1; cursor: not-allowed; }

        .unlock-banner {
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--accent-blue);
            color: var(--accent-blue);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">
            <h1>WALL ST<span>TYCOON</span></h1>
            <div id="portfolio-val" style="color: #6b7280; font-size: 0.9rem;">Portfölj: 0 kr</div>
        </div>
        <div class="wallet-info">
            <div class="wallet-label">Tillgängligt Kapital</div>
            <div id="balance" class="balance-val">10 000</div>
        </div>
    </header>

    <div id="market" class="market-grid">
        </div>

    <div id="milestone-container"></div>
</div>

<script>
    let balance = 10000;
    
    // Aktiedata
    const stocks = {
        "Apple": { ticker: "AAPL", price: 1800, history: [], owned: 0, unlockAt: 0, vol: 0.012, type: "Aktie" },
        "Microsoft": { ticker: "MSFT", price: 3500, history: [], owned: 0, unlockAt: 0, vol: 0.01, type: "Aktie" },
        "Tesla": { ticker: "TSLA", price: 2100, history: [], owned: 0, unlockAt: 20000, vol: 0.04, type: "Aktie" },
        "Nvidia": { ticker: "NVDA", price: 4500, history: [], owned: 0, unlockAt: 20000, vol: 0.05, type: "Aktie" },
        "Amazon": { ticker: "AMZN", price: 1500, history: [], owned: 0, unlockAt: 50000, vol: 0.02, type: "Aktie" },
        "Bitcoin": { ticker: "BTC", price: 650000, history: [], owned: 0, unlockAt: 1000000, vol: 0.09, type: "Coin" },
        "Ethereum": { ticker: "ETH", price: 32000, history: [], owned: 0, unlockAt: 1000000, vol: 0.12, type: "Coin" }
    };

    // Initiera historik för grafer
    for (let s in stocks) {
        for (let i = 0; i < 40; i++) stocks[s].history.push(stocks[s].price);
    }

    function update() {
        const marketEl = document.getElementById('market');
        const balanceEl = document.getElementById('balance');
        const portfolioEl = document.getElementById('portfolio-val');
        const milestoneEl = document.getElementById('milestone-container');

        marketEl.innerHTML = '';
        balanceEl.innerText = Math.floor(balance).toLocaleString('sv-SE') + " kr";
        
        let totalWealth = balance;
        let portfolioValue = 0;

        for (let name in stocks) {
            let s = stocks[name];
            portfolioValue += s.owned * s.price;

            if (balance >= s.unlockAt || s.owned > 0) {
                const isUp = s.price >= s.history[s.history.length - 2];
                const card = document.createElement('div');
                card.className = 'stock-card';
                card.innerHTML = `
                    <div class="stock-name">
                        <span class="ticker">${s.ticker}</span>
                        <h3>${name}</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="chart-${s.ticker}"></canvas>
                    </div>
                    <div class="price-info">
                        <div class="price-now" style="color: ${isUp ? 'var(--accent-green)' : 'var(--accent-red)'}">
                            ${s.price.toFixed(2)} kr
                        </div>
                        <div class="owned-tag">Du äger: ${s.owned}</div>
                    </div>
                    <div class="btn-group">
                        <button class="buy-btn" onclick="buy('${name}')">KÖP</button>
                        <button class="sell-btn" onclick="sell('${name}')" ${s.owned <= 0 ? 'disabled' : ''}>SÄLJ</button>
                    </div>
                `;
                marketEl.appendChild(card);
                drawChart(s.ticker, s.history, isUp);
            }
        }

        portfolioEl.innerText = `Portföljvärde: ${Math.floor(portfolioValue).toLocaleString('sv-SE')} kr`;

        // Milestone messages
        if (balance < 20000) {
            milestoneEl.innerHTML = `<div class="unlock-banner">Nå 20 000 kr för att låsa upp Tesla & Nvidia 🚀</div>`;
        } else if (balance < 1000000) {
            milestoneEl.innerHTML = `<div class="unlock-banner">Nå 1 000 000 kr för att låsa upp Crypto (BTC/ETH) 💎</div>`;
        } else {
            milestoneEl.innerHTML = `<div class="unlock-banner" style="color: var(--gold); border-color: var(--gold)">VÄLKOMMEN TILL ELITEN - CRYPTO UPPLÅST! 🚀🌕</div>`;
        }
    }

    function drawChart(ticker, history, isUp) {
        const canvas = document.getElementById(`chart-${ticker}`);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        const min = Math.min(...history) * 0.98;
        const max = Math.max(...history) * 1.02;

        ctx.beginPath();
        ctx.strokeStyle = isUp ? '#10b981' : '#f43f5e';
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';

        history.forEach((p, i) => {
            const x = (i / (history.length - 1)) * canvas.width;
            const y = canvas.height - ((p - min) / (max - min)) * canvas.height;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    function buy(name) {
        if (balance >= stocks[name].price) {
            balance -= stocks[name].price;
            stocks[name].owned++;
            update();
        }
    }

    function sell(name) {
        if (stocks[name].owned > 0) {
            balance += stocks[name].price;
            stocks[name].owned--;
            update();
        }
    }

    function tick() {
        for (let name in stocks) {
            let s = stocks[name];
            let change = 1 + (Math.random() * s.vol * 2 - s.vol) + 0.001; // Liten trend uppåt
            s.price *= change;
            if (s.price < 10) s.price = 10;
            s.history.push(s.price);
            if (s.history.length > 40) s.history.shift();
        }
        update();
    }

    setInterval(tick, 1000);
    update();
</script>

</body>
</html>
