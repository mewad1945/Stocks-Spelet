<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Clone - Tycoon Edition</title>
    <style>
        :root {
            --bg-deep: #0a0e17;
            --bg-panel: #131722;
            --bg-hover: #1e222d;
            --text-main: #d1d4dc;
            --text-bright: #ffffff;
            --up: #089981;
            --down: #f23645;
            --border: #2a2e39;
            --accent: #2962ff;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Trebuchet MS', sans-serif;
            margin: 0;
            overflow: hidden; /* Gör att det känns som en app */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header --- */
        header {
            height: 50px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .balance-info { display: flex; gap: 30px; font-weight: bold; }
        .balance-info span { color: var(--up); }

        /* --- Main Layout --- */
        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            flex-grow: 1;
            overflow: hidden;
        }

        /* --- Sidebar / Watchlist --- */
        .sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .search-box {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .search-box input {
            width: 100%;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .watchlist { overflow-y: auto; flex-grow: 1; }
        .watch-item {
            padding: 12px 15px;
            border-bottom: 1px solid #1e222d;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: 0.2s;
        }
        .watch-item:hover { background: var(--bg-hover); }
        .watch-item.active { border-left: 3px solid var(--accent); background: var(--bg-hover); }
        .watch-item .ticker { font-weight: bold; color: var(--text-bright); }
        .watch-item .price { font-family: monospace; }

        /* --- Chart Area --- */
        .chart-area {
            background: var(--bg-deep);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            padding: 15px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        #main-canvas {
            flex-grow: 1;
            cursor: crosshair;
        }

        /* --- Order Panel --- */
        .order-panel {
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            padding: 20px;
        }

        .order-card {
            background: var(--bg-hover);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .btn-buy { background: var(--up); width: 100%; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-sell { background: var(--down); width: 100%; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.2; }

        .unlock-msg {
            font-size: 0.8rem;
            color: var(--accent);
            text-align: center;
            margin-top: 10px;
        }

    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; letter-spacing: 1px;">TRADINGVIEW <span style="color:var(--accent)">PRO</span></div>
    <div class="balance-info">
        <div>KAPITAL: <span id="balance">10 000</span> kr</div>
        <div>PORTFÖLJ: <span id="portfolio" style="color:var(--text-bright)">0</span> kr</div>
    </div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="search-box">
            <input type="text" id="search" placeholder="Sök aktie (t.ex. Apple)..." oninput="renderWatchlist()">
        </div>
        <div class="watchlist" id="watchlist">
            </div>
    </div>

    <div class="chart-area">
        <div class="chart-header">
            <h2 id="active-name" style="margin:0; color:white;">Apple Inc.</h2>
            <span id="active-ticker" class="ticker" style="color:#6b7280">AAPL</span>
            <span id="active-price" style="font-size: 1.5rem; font-weight: bold; font-family: monospace;">0.00</span>
        </div>
        <canvas id="main-canvas"></canvas>
    </div>

    <div class="order-panel">
        <h3>Orderpanel</h3>
        <div class="order-card">
            <div style="margin-bottom: 10px;">Innehav: <b id="owned-count">0</b> st</div>
            <button class="btn-buy" onclick="trade('buy')">KÖP (1 st)</button>
            <button class="btn-sell" id="sell-btn" onclick="trade('sell')">SÄLJ (1 st)</button>
        </div>
        <div id="unlock-info" class="unlock-msg">Lås upp Tesla vid 20 000 kr</div>
    </div>
</div>

<script>
    let balance = 10000;
    let selectedTicker = "AAPL";
    
    const stocks = {
        "AAPL": { name: "Apple", price: 1850, history: [], owned: 0, unlock: 0, vol: 0.008 },
        "MSFT": { name: "Microsoft", price: 3400, history: [], owned: 0, unlock: 0, vol: 0.007 },
        "TSLA": { name: "Tesla", price: 2100, history: [], owned: 0, unlock: 20000, vol: 0.03 },
        "NVDA": { name: "Nvidia", price: 4200, history: [], owned: 0, unlock: 20000, vol: 0.04 },
        "AMZN": { name: "Amazon", price: 1600, history: [], owned: 0, unlock: 50000, vol: 0.015 },
        "BTC": { name: "Bitcoin", price: 680000, history: [], owned: 0, unlock: 1000000, vol: 0.08 },
        "ETH": { name: "Ethereum", price: 35000, history: [], owned: 0, unlock: 1000000, vol: 0.10 }
    };

    // Initiera historik
    for(let s in stocks) {
        for(let i=0; i<100; i++) stocks[s].history.push(stocks[s].price * (1 + (Math.random()*0.02 - 0.01)));
    }

    function renderWatchlist() {
        const list = document.getElementById('watchlist');
        const query = document.getElementById('search').value.toLowerCase();
        list.innerHTML = '';

        for (let t in stocks) {
            const s = stocks[t];
            if (balance < s.unlock && s.owned === 0) continue; // Dold om inte råd/upplåst
            if (s.name.toLowerCase().includes(query) || t.toLowerCase().includes(query)) {
                const isUp = s.price >= s.history[s.history.length-2];
                const div = document.createElement('div');
                div.className = `watch-item ${selectedTicker === t ? 'active' : ''}`;
                div.onclick = () => { selectedTicker = t; updateDisplay(); };
                div.innerHTML = `
                    <span class="ticker">${t}</span>
                    <span class="price" style="color:${isUp ? 'var(--up)' : 'var(--down)'}">${s.price.toFixed(2)}</span>
                `;
                list.appendChild(div);
            }
        }
    }

    function updateDisplay() {
        const s = stocks[selectedTicker];
        document.getElementById('active-name').innerText = s.name;
        document.getElementById('active-ticker').innerText = selectedTicker;
        document.getElementById('active-price').innerText = s.price.toFixed(2) + " kr";
        document.getElementById('active-price').style.color = s.price >= s.history[s.history.length-2] ? 'var(--up)' : 'var(--down)';
        document.getElementById('owned-count').innerText = s.owned;
        document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
        
        let portVal = 0;
        for(let t in stocks) portVal += stocks[t].owned * stocks[t].price;
        document.getElementById('portfolio').innerText = Math.floor(portVal).toLocaleString();

        document.getElementById('sell-btn').disabled = s.owned <= 0;
        
        // Upplåsningsinfo
        const next = Object.values(stocks).find(st => st.unlock > balance);
        document.getElementById('unlock-info').innerText = next ? `Nästa upplåsning: ${next.name} vid ${next.unlock.toLocaleString()} kr` : "Alla tillgångar upplåsta!";

        renderWatchlist();
        drawMainChart();
    }

    function drawMainChart() {
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        const history = stocks[selectedTicker].history;
        const min = Math.min(...history) * 0.99;
        const max = Math.max(...history) * 1.01;

        // Rita rutnät
        ctx.strokeStyle = '#1e222d';
        ctx.lineWidth = 1;
        for(let i=0; i<10; i++) {
            let y = (canvas.height / 10) * i;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            let x = (canvas.width / 10) * i;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }

        // Rita linje
        ctx.beginPath();
        ctx.strokeStyle = history[history.length-1] >= history[0] ? varToHex('--up') : varToHex('--down');
        ctx.lineWidth = 2;
        history.forEach((p, i) => {
            const x = (i / (history.length - 1)) * canvas.width;
            const y = canvas.height - ((p - min) / (max - min)) * canvas.height;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    function varToHex(varName) {
        return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    function trade(type) {
        const s = stocks[selectedTicker];
        if (type === 'buy' && balance >= s.price) {
            balance -= s.price;
            s.owned++;
        } else if (type === 'sell' && s.owned > 0) {
            balance += s.price;
            s.owned--;
        }
        updateDisplay();
    }

    function tick() {
        for (let t in stocks) {
            let s = stocks[t];
            s.price *= (1 + (Math.random() * s.vol * 2 - s.vol));
            s.history.push(s.price);
            if (s.history.length > 100) s.history.shift();
        }
        updateDisplay();
    }

    setInterval(tick, 1000);
    window.addEventListener('resize', drawMainChart);
    updateDisplay();
</script>

</body>
</html>
